<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicons/desktopfavicon.ico">
    <link rel="icon" type="image/png" href="favicons/mobilefavicon.png">
    <link rel="apple-touch-icon" href="favicons/mobilefavicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failed to Load</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
        body {
            background-color: #eaeaea;
            text-align: center;
            margin-top: 50px;
            font-family: DM Sans, serif;
        }
        .heading {
            font-size: 70px;
        }
        .image {
            width: 300px;
            height: auto;
            size: contain;
        }
        .behind-box-text {
            font-size: 20px;
            color: #000000;
            background-color: white;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }
        .button-style {
            background:rgb(67, 67, 67);
            color: rgb(255, 255, 255);
            border-radius: 10px;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block; 
            margin: 15px;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .button-style:hover {
            background: rgb(0, 0, 0);
            transform: scale(1.04);
        }
    </style>
</head>
<body>
    <div class="behind-box-text">
    <h1 class="heading">404</h1>
    <h4>Page not Found</h4>
    <p>This page might not exist, or is under construction.<br>Please, contact the administrator.</p>
    <a href="/home-page" class="button-style">Go Back</a>
    <h6 style="color: red;">ERR_NOT_FOUND</h6>
    </div>
    </body>
