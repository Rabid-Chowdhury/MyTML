<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicons/desktopfavicon.ico">
    <link rel="icon" type="image/png" href="favicons/mobilefavicon.png">
    <link rel="apple-touch-icon" href="favicons/mobilefavicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabid | About</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
    body {
      font-family: 'DM Sans', serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #f0f0f0;
      color: #111;
    }

    header {
      background: #fff;
      padding: 15px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #111;
      font-weight: bold;
    }

    nav a:hover {
      color: #4f46e5;
    }

    .box {
      background: rgba(255,255,255,0.9);
      padding: 20px;
      border-radius: 10px;
      margin: 40px auto;
      max-width: 700px;
      text-align: center;
    }

    .button-style {
      display: inline-block;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 10px;
      background: rgba(39,39,39,0.6);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      cursor: pointer;
    }

    .button-style:hover {
      background: rgb(0, 0, 0);
      transform: scale(1.04);
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="/home-page">Home</a>
    <a href="/about">About</a>
    <a href="/projects">Projects</a>
    <a href="/contact">Contact</a>
  </nav>
</header>

<div class="box">
  <h2>About Me</h2>
  <p>I am a web developer passionate about HTML, CSS, and JavaScript. I love building clean and responsive websites.</p>
  <a href="/projects" class="button-style">See Projects</a>
</div>

</body>
</html>
