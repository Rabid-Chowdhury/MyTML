<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicons/desktopfavicon.ico">
    <link rel="icon" type="image/png" href="favicons/mobilefavicon.png">
    <link rel="apple-touch-icon" href="favicons/mobilefavicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
        body {
            background-color: #eaeaea;
            text-align: center;
            margin-top: 50px;
            font-family: 'DM Sans', sans-serif;
        }
        .heading {
            font-size: 60px; /* Adjusted slightly for longer text */
            margin-bottom: 10px;
        }
        .behind-box-text {
            font-size: 20px;
            color: #000000;
            background-color: white;
            display: inline-block;
            padding: 20px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }
        .button-style {
            background: rgb(67, 67, 67);
            color: rgb(255, 255, 255);
            border-radius: 10px;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block; 
            margin: 15px;
            transition: 0.2s;
            cursor: pointer;
        }
        .button-style:hover {
            background: rgb(0, 0, 0);
            transform: scale(1.04);
        }
    </style>
</head>
<body>
    <div class="behind-box-text">
        <h1 class="heading">Coming Soon</h1>
        <h4>Under Construction</h4>
        <p>This page is currently not public.<br>Please check back later or contact the administrator.</p>
        <a href="/third-page" class="button-style">Go Back</a>
        <h6 style="color: orange;">ERR_NOT_PUBLIC</h6>
    </div>
</body>
